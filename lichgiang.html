<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f5f7fb;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
  padding:12px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
  z-index:1000;
}

/* NAV */
nav ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  gap:10px;
}

nav li{
  position:relative;
}

nav a{
  color:white;
  text-decoration:none;
  padding:10px 16px;
  border-radius:999px;
  display:block;
  transition:0.3s;
}

nav a:hover{
  background:rgba(255,255,255,0.15);
}

/* dropdown */
nav ul ul{
  position:absolute;
  top:120%;
  left:0;
  background:white;
  border-radius:12px;
  min-width:220px;
  padding:8px 0;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  opacity:0;
  visibility:hidden;
  transform:translateY(10px);
  transition:0.3s;
  z-index:9999;
}

nav ul ul a{
  color:#1f2937;
  padding:10px 16px;
}

nav ul ul a:hover{
  background:#f1f5f9;
  padding-left:20px;
}

nav li:hover > ul{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}

nav ul{display:flex;list-style:none;margin:0;padding:0;gap:10px}
nav li{position:relative}
nav a{
  color:white;
  text-decoration:none;
  padding:10px 16px;
  border-radius:999px;
}
nav a:hover{background:rgba(255,255,255,0.15)}

/* FORM */
.container{
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.form-group{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:5px;
  font-weight:500;
}

input, select, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#4338ca;
}

/* SUCCESS */
.success{
  display:none;
  text-align:center;
  color:green;
  margin-top:15px;
}
</style>
</head>

<div class="container">
<h2>📅 Đăng ký lịch giảng cộng đồng</h2>

<form onsubmit="submitForm(event)">

<div class="form-group">
<label>Họ và tên</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Môn học</label>
<select required>
<option value="">-- Chọn môn --</option>
<option>Toán</option>
<option>Văn</option>
<option>Tiếng Anh</option>
<option>Vật lý</option>
<option>Khác</option>
</select>
</div>

<div class="form-group">
<label>Ngày giảng</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Thời gian</label>
<input type="time" required>
</div>

<div class="form-group">
<label>Nội dung giảng</label>
<textarea rows="4" placeholder="Mô tả nội dung buổi giảng..."></textarea>
</div>

<button type="submit">Đăng ký</button>

<div class="success" id="successMsg">
✅ Đăng ký thành công!
</div>

</form>
</div>

<script>
function submitForm(e){
  e.preventDefault();
  document.getElementById("successMsg").style.display = "block";
}
</script>
